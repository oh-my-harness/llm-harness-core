# Cargo configuration for llm-harness-core

# Current configuration: Using local llm-api-adapter path dependency
# (Cargo.toml specifies: llm_adapter = { path = "../llm-api-adapter" })
#
# To use git dependency instead (for CI/reproducible builds with locked commit):
# 1. Uncomment the [source...] section below
# 2. Change Cargo.toml back to: llm_adapter = { git = "https://github.com/oh-my-harness/llm-api-adapter", rev = "..." }
#
# [source.git-oh-my-harness]
# git = "https://github.com/oh-my-harness/llm-api-adapter"
# replace-with = "local-llm-api-adapter"
#
# [source.local-llm-api-adapter]
# directory = "../llm-api-adapter"
